<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js">
    </script>
</head>

<body>
    <script>
        function init(changeIndex) {
            if (changeIndex < -2) {
                changeIndex = -2;
            }
            if (changeIndex > 12) {
                changeIndex = 12;
            }
            let myList = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];
            let myList2 = Array.from({ length: 7 }, () => myList).flat().slice(0, -10);
            console.log(myList2);

            var myObject = myList2.reduce(function (obj, currentVal, index) {
                obj[`${currentVal}${parseInt(index / 12) + 1}'`] = `${index + changeIndex + 3}.mp3`;
                return obj;
            }, {});
            console.log(myObject);
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border-collapse: collapse;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            font-size: small;
        }



        #white-button-group {
            width: 100%;
            height: 100px;
            position: absolute;
            bottom: 0;
        }

        #black-button-group {
            width: auto;
            height: 100px;
            position: absolute;
            bottom: 25px;
            left: 7.5px;
            display: inline-block;
        }

        .white.button {
            width: 30px;
            height: 100px;
            display: inline-block;
            text-align: center;
            line-height: 150px;
            background-color: whitesmoke;
            border-bottom: 1px solid darkgray;
            border-right: 1px solid darkgray;
        }

        .black.button {
            width: 15px;
            height: 50px;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            margin-left: 15px;
            background-color: darkgray;
            border-bottom: 1px solid black;
            border-right: 1px solid black;
        }

        .empty.button {
            width: 30px;
            height: 50px;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            background-color: none;
            border-bottom: 1px solid none;
            border-right: 1px solid none;
        }

        .key {
            display: inline-block;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            background-color: black;
            color: white;
            font-size: large;
            border: 1px solid white;
        }

        #piano {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js">

    </script>
</head>

<body>
    <div id="sheet">

    </div>
    <div id="piano">
        <div id="white-button-group">
        </div>
        <div id="black-button-group">
        </div>
    </div>
</body>
<script>
    let idx = 0;
    let list = [
        '1', '!',
        '2', '@',
        '3',
        '4', '$',
        '5', '%',
        '6', '^',
        '7',
        '8', '*',
        '9', '(',
        '0',
        'q', 'Q',
        'w', 'W',
        'e', 'E',
        'r',
        't', 'T',
        'y', 'Y',
        'u',
        'i', 'I',
        'o', 'O',
        'p', 'P',
        'a',
        's', 'S',
        'd', 'D',
        'f',
        'g', 'G',
        'h', 'H',
        'j', 'J',
        'k',
        'l', 'L',
        'z', 'Z',
        'x',
        'c', 'C',
        'v', 'V',
        'b', 'B',
        'n',
        'm', 'M'
    ];
    let map = new Map();
    for (let i = 0; i < list.length; i++) {
        map.set(list[i], i);
    };
    let sequence = ['c', 'cs', 'd', 'ds', 'e', 'f', 'fs', 'g', 'gs', 'a', 'as', 'b'];
    let codeList = [];
    for (let i = 2; i < 8; i++) {
        for (j = 0; j < sequence.length; j++) {
            codeList.push(sequence[j] + i);
        }
    }
    console.log(codeList);
    const synth = new Tone.PolySynth().toDestination();
    // set the attributes across all the voices using 'set'
    function init() {
        function createWhiteButton(idx) {
            let piano = document.getElementById('white-button-group');
            let button = document.createElement('div');
            button.id = `button-${idx}`
            button.className = 'white button';
            button.dataset.value = codeList[idx];
            button.innerHTML = list[idx];
            piano.appendChild(button);
        };
        function createEmptyBlackButton() {
            let piano = document.getElementById('black-button-group');
            let button = document.createElement('div');
            button.className = 'empty button';
            button.innerHTML = ' ';
            piano.appendChild(button);
        }
        function createBlackButton(idx) {
            let piano = document.getElementById('black-button-group');
            let button = document.createElement('div');
            button.id = `button-${idx}`
            button.className = 'black button';
            button.dataset.value = codeList[idx];
            button.innerHTML = list[idx];
            piano.appendChild(button);
        };
        for (let i = 0; i < 36; i++) {
            createWhiteButton(idx++);
            if (i % 7 == 2 || i % 7 == 6) {
                createEmptyBlackButton();
            } else {
                createBlackButton(idx++);
            }
        }
    };
    init();
    let sheet = document.getElementById('sheet');
    document.body.addEventListener('keydown', function (e) {
        if (!e.repeat) {
            try {
                let button = document.getElementById(`button-${map.get(e.key)}`);
                console.log(button.dataset.value);
                button.style = 'filter:invert(1)';
                synth.triggerAttack(button.dataset.value, '8n');
                let key = document.createElement('div');
                key.className = 'key';
                key.innerHTML = e.key;
                sheet.appendChild(key);
                setTimeout(function () {
                    synth.triggerRelease(button.dataset.value);
                }, 1000)
            } catch (e) {
                console.log(e);
            }
        }
    })
    document.body.addEventListener('keyup', function (e) {
        try {
            let button = document.getElementById(`button-${map.get(e.key)}`);
            button.style = 'filter:invert(0)';
            synth.triggerRelease(button.dataset.value);
        } catch (e) {
            console.log(e);
        }
    })
    setInterval(function () {
        let key = document.createElement('div');
        key.className = 'key';
        key.innerHTML = "&nbsp;"
        sheet.appendChild(key);
    }, 250);
</script>

</html>

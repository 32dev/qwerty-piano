<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>piano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border-collapse: collapse;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            font-size: small;
        }



        #white-button-group {
            width: 100%;
            height: 100px;
            position: absolute;
            bottom: 0;
        }

        #black-button-group {
            width: auto;
            height: 100px;
            position: absolute;
            bottom: 25px;
            left: 7.5px;
            display: inline-block;
        }

        .white.button {
            width: 30px;
            height: 100px;
            display: inline-block;
            text-align: center;
            line-height: 150px;
            background-color: whitesmoke;
            border-bottom: 1px solid darkgray;
            border-right: 1px solid darkgray;
        }

        .black.button {
            width: 15px;
            height: 50px;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            margin-left: 15px;
            background-color: darkgray;
            border-bottom: 1px solid black;
            border-right: 1px solid black;
        }

        .empty.button {
            width: 30px;
            height: 50px;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            background-color: none;
            border-bottom: 1px solid none;
            border-right: 1px solid none;
        }

        .key {
            display: inline-block;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            background-color: black;
            color: white;
            font-size: large;
            border: 1px solid white;
        }

        #piano {
            width: 100%;
            height: 50%;
            position: absolute;

        }

        #sheet {
            width: 85%;
            height: 50%;
            position: absolute;
            top: 0;
            left: 0;

        }

        #root {
            width: 80%;
            height: 80%;
            position: relative;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js">

    </script>
</head>

<body>
    <div id="root">
        <div id="sheet">

        </div>
        <div id="piano">
            <div id="white-button-group">
            </div>
            <div id="black-button-group">
            </div>
        </div>
    </div>

</body>
<script>
    let idx = 0;
    let list = [
        '1', '!',
        '2', '@',
        '3',
        '4', '$',
        '5', '%',
        '6', '^',
        '7',
        '8', '*',
        '9', '(',
        '0',
        'q', 'Q',
        'w', 'W',
        'e', 'E',
        'r',
        't', 'T',
        'y', 'Y',
        'u',
        'i', 'I',
        'o', 'O',
        'p', 'P',
        'a',
        's', 'S',
        'd', 'D',
        'f',
        'g', 'G',
        'h', 'H',
        'j', 'J',
        'k',
        'l', 'L',
        'z', 'Z',
        'x',
        'c', 'C',
        'v', 'V',
        'b', 'B',
        'n',
        'm',
        'M'
    ];
    let map = new Map();
    for (let i = 0; i < list.length; i++) {
        map.set(list[i], i);
    };
    let sequence = ['c', 'cs', 'd', 'ds', 'e', 'f', 'fs', 'g', 'gs', 'a', 'as', 'b'];
    let codeList = [];
    for (let i = 2; i < 8; i++) {
        for (j = 0; j < sequence.length; j++) {
            codeList.push(sequence[j] + i);
        }
    }
    let synth = null;
    function init() {
        function createWhiteButton(idx) {
            let piano = document.getElementById('white-button-group');
            let button = document.createElement('div');
            button.id = `button-${idx}`
            button.className = 'white button';
            button.dataset.value = codeList[idx];
            button.innerHTML = list[idx];
            piano.appendChild(button);
        };
        function createEmptyBlackButton() {
            let piano = document.getElementById('black-button-group');
            let button = document.createElement('div');
            button.className = 'empty button';
            button.innerHTML = ' ';
            piano.appendChild(button);
        }
        function createBlackButton(idx) {
            let piano = document.getElementById('black-button-group');
            let button = document.createElement('div');
            button.id = `button-${idx}`
            button.className = 'black button';
            button.dataset.value = codeList[idx];
            button.innerHTML = list[idx];
            piano.appendChild(button);
        };
        for (let i = 0; i < 36; i++) {
            if (i == 35) {
                break;
            }
            createWhiteButton(idx++);
            if (i % 7 == 2 || i % 7 == 6) {
                createEmptyBlackButton();
            } else {
                createBlackButton(idx++);
            }

        }
    };
    init();
    let tempMap = new Map();
    tempMap.set('cs2', 'c#2');
    tempMap.set('ds2', 'd#2');
    tempMap.set('fs2', 'f#2');
    tempMap.set('gs2', 'g#2');
    tempMap.set('as2', 'a#2');
    tempMap.set('cs3', 'c#3');
    tempMap.set('ds3', 'd#3');
    tempMap.set('fs3', 'f#3');
    tempMap.set('gs3', 'g#3');
    tempMap.set('as3', 'a#3');
    tempMap.set('cs4', 'c#4');
    tempMap.set('ds4', 'd#4');
    tempMap.set('fs4', 'f#4');
    tempMap.set('gs4', 'g#4');
    tempMap.set('as4', 'a#4');
    tempMap.set('cs5', 'c#5');
    tempMap.set('ds5', 'd#5');
    tempMap.set('fs5', 'f#5');
    tempMap.set('gs5', 'g#5');
    tempMap.set('as5', 'a#5');
    tempMap.set('cs6', 'c#6');
    tempMap.set('ds6', 'd#6');
    tempMap.set('fs6', 'f#6');
    tempMap.set('gs6', 'g#6');
    tempMap.set('as6', 'a#6');
    tempMap.set('cs7', 'c#7');
    tempMap.set('ds7', 'd#7');
    tempMap.set('fs7', 'f#7');
    tempMap.set('gs7', 'g#7');
    tempMap.set('as7', 'a#7');
    let sheet = document.getElementById('sheet');
    document.body.addEventListener('keydown', function (e) {
        if (e.key == ' ') {
            let key = document.createElement('div');
            key.className = 'key';
            key.innerHTML = '&nbsp;';
            sheet.appendChild(key);
            return;
        }
        if (synth != null) {
            if (!e.repeat) {
                try {
                    let button = document.getElementById(`button-${map.get(e.key)}`);
                    console.log(button.dataset.value);
                    button.style = 'filter:invert(1)';
                    // synth.triggerAttack(button.dataset.value);
                    // synth.triggerAttackRelease(button.dataset.value, '1n');
                    if ((button.dataset.value).includes('s') == true) {
                        synth.triggerAttack(tempMap.get(button.dataset.value));
                    } else {
                        synth.triggerAttack(button.dataset.value);
                    }
                    let key = document.createElement('div');
                    key.className = 'key';
                    key.innerHTML = e.key;
                    sheet.appendChild(key);
                } catch (e) {
                    console.log(e);
                }
            }
        } else {
            synth = new Tone.Sampler({
                urls: {
                    "c2": "3.mp3",
                    "c#2": "4.mp3",
                    "d2": "5.mp3",
                    "d#2": "6.mp3",
                    "e2": "7.mp3",
                    "f2": "8.mp3",
                    "f#2": "9.mp3",
                    "g2": "10.mp3",
                    "g#2": "11.mp3",
                    "a2": "12.mp3",
                    "a#2": "13.mp3",
                    "b2": "14.mp3",
                    "c3": "15.mp3",
                    "c#3": "16.mp3",
                    "d3": "17.mp3",
                    "d#3": "18.mp3",
                    "e3": "19.mp3",
                    "f3": "20.mp3",
                    "f#3": "21.mp3",
                    "g3": "22.mp3",
                    "g#3": "23.mp3",
                    "a3": "24.mp3",
                    "a#3": "25.mp3",
                    "b3": "26.mp3",
                    "c4": "27.mp3",
                    "c#4": "28.mp3",
                    "d4": "29.mp3",
                    "d#4": "30.mp3",
                    "e4": "31.mp3",
                    "f4": "32.mp3",
                    "f#4": "33.mp3",
                    "g4": "34.mp3",
                    "g#4": "35.mp3",
                    "a4": "36.mp3",
                    "a#4": "37.mp3",
                    "b4": "38.mp3",
                    "c5": "39.mp3",
                    "c#5": "40.mp3",
                    "d5": "41.mp3",
                    "d#5": "42.mp3",
                    "e5": "43.mp3",
                    "f5": "44.mp3",
                    "f#5": "45.mp3",
                    "g5": "46.mp3",
                    "g#5": "47.mp3",
                    "a5": "48.mp3",
                    "a#5": "49.mp3",
                    "b5": "50.mp3",
                    "c6": "51.mp3",
                    "c#6": "52.mp3",
                    "d6": "53.mp3",
                    "d#6": "54.mp3",
                    "e6": "55.mp3",
                    "f6": "56.mp3",
                    "f#6": "57.mp3",
                    "g6": "58.mp3",
                    "g#6": "59.mp3",
                    "a6": "60.mp3",
                    "a#6": "61.mp3",
                    "b6": "62.mp3",
                    "c7": "63.mp3",
                    "c#7": "64.mp3",
                    "d7": "65.mp3",
                    "d#7": "66.mp3",
                    "e7": "67.mp3",
                    "f7": "68.mp3",
                    "f#7": "69.mp3",
                    "g7": "70.mp3",
                    "g#7": "71.mp3",
                    "a7": "72.mp3",
                    "a#7": "73.mp3",
                    "b7": "74.mp3",
                },
                release: 1,
                baseUrl: "https://32dev.github.io/qwerty-piano/piano-sound/"
            }).toDestination();
        }
    })
    document.body.addEventListener('keyup', function (e) {

        try {
            let button = document.getElementById(`button-${map.get(e.key)}`);
            button.style = 'filter:invert(0)';
            setTimeout(function () {
                if ((button.dataset.value).includes('s') == true) {
                    synth.triggerRelease(tempMap.get(button.dataset.value));
                } else {
                    synth.triggerRelease(button.dataset.value);
                }
            }, 4000)
        } catch (e) {
            console.log(e);
        }

    })
    // setInterval(function () {
    //     let key = document.createElement('div');
    //     key.className = 'key';
    //     key.innerHTML = '&nbsp;';
    //     sheet.appendChild(key);
    // }, 250);
</script>

</html>
